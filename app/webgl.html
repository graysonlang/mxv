<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mxv WebGL</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo=" />
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #101312;
      color: #ebe7dc;
      margin: 0;
      overflow: hidden;
    }

    #container {
      min-height: 100vh;
      position: relative;
    }

    #webglcanvas {
      display: block;
      height: 100vh;
      outline: none;
      width: 100vw;
    }

    .hud {
      display: grid;
      gap: 8px;
      left: 12px;
      max-width: min(520px, calc(100vw - 24px));
      position: fixed;
      top: 12px;
      z-index: 5;
    }

    .select-row {
      align-items: center;
      background: rgba(13, 17, 16, 0.78);
      border: 1px solid rgba(183, 205, 193, 0.18);
      box-sizing: border-box;
      display: grid;
      gap: 8px;
      grid-template-columns: 76px minmax(0, 1fr);
      min-height: 34px;
      padding: 6px 8px;
    }

    .bottom-hud {
      align-items: flex-end;
      bottom: 12px;
      display: flex;
      gap: 8px;
      left: 12px;
      max-width: calc(100vw - 24px);
      pointer-events: none;
      position: fixed;
      z-index: 6;
    }

    .properties-panel {
      background: rgba(13, 17, 16, 0.78);
      border: 1px solid rgba(183, 205, 193, 0.18);
      bottom: 12px;
      box-sizing: border-box;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      max-height: min(520px, calc(100vh - 24px));
      max-width: min(380px, calc(100vw - 24px));
      position: fixed;
      right: 12px;
      width: 340px;
      z-index: 5;
    }

    .properties-header {
      border-bottom: 1px solid rgba(183, 205, 193, 0.14);
      display: grid;
      gap: 4px;
      padding: 10px;
    }

    .panel-title {
      color: #f0eee7;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.2;
      margin: 0;
      text-transform: uppercase;
    }

    .properties-summary {
      color: #a5b1ab;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .properties-list {
      display: grid;
      gap: 13px;
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .property-group {
      display: grid;
      gap: 7px;
    }

    .property-group-title {
      color: #d6d8ce;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.2;
      margin: 0;
      text-transform: uppercase;
    }

    .property-row {
      align-items: center;
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(92px, 1fr) minmax(0, 1.25fr) 46px;
      min-height: 30px;
      opacity: 0.68;
    }

    .status {
      align-items: center;
      background: rgba(13, 17, 16, 0.72);
      border: 1px solid rgba(183, 205, 193, 0.16);
      box-sizing: border-box;
      display: flex;
      gap: 10px;
      min-height: 28px;
      min-width: 0;
      padding: 6px 9px;
    }

    label,
    .status-label,
    .property-label {
      color: #a5b1ab;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .property-label {
      overflow-wrap: anywhere;
      text-transform: none;
    }

    select {
      appearance: none;
      background: #0f1513;
      border: 1px solid #3d4944;
      border-radius: 6px;
      color: #f0eee7;
      font: 13px/1.2 ui-sans-serif, system-ui, sans-serif;
      min-height: 30px;
      min-width: 0;
      padding: 0 10px;
      width: 100%;
    }

    input[type="range"] {
      accent-color: #65716c;
      min-width: 0;
      width: 100%;
    }

    input[type="color"] {
      appearance: none;
      background: #0f1513;
      border: 1px solid #3d4944;
      border-radius: 6px;
      box-sizing: border-box;
      height: 30px;
      min-width: 0;
      padding: 0;
      width: 100%;
    }

    input[type="checkbox"] {
      accent-color: #65716c;
      height: 16px;
      margin: 0;
      width: 16px;
    }

    .toggle-control {
      align-items: center;
      display: flex;
      min-height: 30px;
    }

    .property-control {
      align-items: center;
      display: grid;
      gap: 7px;
      grid-template-columns: minmax(0, 1fr) 36px;
      min-width: 0;
    }

    .property-control output {
      color: #f0eee7;
      font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-align: right;
    }

    .support-pill {
      border: 1px solid rgba(183, 205, 193, 0.20);
      border-radius: 999px;
      color: #8d9a94;
      font: 700 9px/1 ui-sans-serif, system-ui, sans-serif;
      justify-self: end;
      min-width: 34px;
      padding: 4px 5px;
      text-align: center;
      text-transform: uppercase;
    }

    .support-pill.is-reload {
      border-color: rgba(237, 196, 115, 0.35);
      color: #efd48b;
    }

    option {
      background: #101312;
      color: #f0eee7;
    }

    .status-value {
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-width: 0;
      overflow: hidden;
      overflow-wrap: anywhere;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fps-overlay {
      background: rgba(13, 17, 16, 0.72);
      border: 1px solid rgba(183, 205, 193, 0.16);
      color: #f0eee7;
      flex: 0 0 auto;
      font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-height: 28px;
      padding: 6px 9px;
    }

    .lil-gui {
      top: 12px !important;
    }

    .peditoritem {
      background-color: #334444;
    }

    .peditorfolder {
      background-color: #333333;
    }

    .peditor_material_assigned {
      background-color: #006cb8;
    }

    .peditor_material_assigned:hover {
      background-color: #32adff;
    }

    @media (max-width: 740px) {
      .hud {
        right: 12px;
      }

      .select-row {
        grid-template-columns: 1fr;
      }

      .bottom-hud {
        align-items: stretch;
        flex-direction: column;
      }

      .properties-panel {
        bottom: 58px;
        left: 12px;
        max-height: 36vh;
        right: 12px;
        width: auto;
      }

      .property-row {
        grid-template-columns: minmax(76px, 0.7fr) minmax(0, 1fr) 44px;
      }

      .status-value {
        white-space: normal;
      }
    }
  </style>
  <script src="./webgl.js" type="module"></script>
</head>
<body>
  <div id="container">
    <div class="hud">
      <div class="select-row">
        <label for="materials">Material</label>
        <select id="materials" name="materials"></select>
      </div>
      <div class="select-row">
        <label for="geometry">Geometry</label>
        <select id="geometry" name="geometry"></select>
      </div>
      <div class="select-row">
        <label for="environment">Env Map</label>
        <select id="environment" name="environment"></select>
      </div>
      <div class="select-row">
        <label for="quality">Quality</label>
        <select id="quality" name="quality"></select>
      </div>
      <div class="select-row">
        <label for="antialias">Antialias</label>
        <select id="antialias" name="antialias"></select>
      </div>
      <div class="select-row">
        <label for="shader-specular">Specular</label>
        <select id="shader-specular" name="shader-specular"></select>
      </div>
      <div class="select-row">
        <label for="shader-albedo">Albedo</label>
        <select id="shader-albedo" name="shader-albedo"></select>
      </div>
      <div class="select-row">
        <label for="shader-interface">Interface</label>
        <select id="shader-interface" name="shader-interface"></select>
      </div>
      <div class="select-row">
        <label for="shader-srgb">sRGB</label>
        <select id="shader-srgb" name="shader-srgb"></select>
      </div>
    </div>
    <div class="bottom-hud">
      <div class="status">
        <span class="status-label">Status</span>
        <span class="status-value" data-status>Loading viewer</span>
      </div>
    </div>
    <aside class="properties-panel" aria-label="Material properties">
      <div class="properties-header">
        <h1 class="panel-title">Material Properties</h1>
        <div class="properties-summary" data-material-properties-summary>WebGL fallback</div>
      </div>
      <div class="properties-list" data-material-properties></div>
    </aside>
    <canvas id="webglcanvas" tabindex="1"></canvas>
  </div>
</body>
</html>
