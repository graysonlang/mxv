<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mxv Direct WebGPU</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo=" />
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #111312;
      color: #f0eee7;
      margin: 0;
      overflow: hidden;
    }

    #container {
      min-height: 100vh;
      position: relative;
    }

    #direct-webgpu-canvas {
      display: block;
      height: 100vh;
      outline: none;
      touch-action: none;
      width: 100vw;
    }

    .panel,
    .hud {
      position: fixed;
      z-index: 5;
    }

    .panel {
      background: rgba(13, 17, 16, 0.78);
      border: 1px solid rgba(194, 211, 203, 0.18);
      box-sizing: border-box;
      display: grid;
      gap: 8px;
      left: 12px;
      max-width: min(340px, calc(100vw - 24px));
      padding: 10px;
      top: 12px;
      width: 300px;
    }

    .metric-row {
      align-items: baseline;
      display: grid;
      gap: 9px;
      grid-template-columns: minmax(92px, 1fr) minmax(0, 1fr);
      min-height: 18px;
    }

    .control-row {
      align-items: center;
      display: grid;
      gap: 9px;
      grid-template-columns: minmax(92px, 1fr) minmax(0, 1fr);
      min-height: 30px;
    }

    .label {
      color: #a8b5ae;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    select {
      appearance: none;
      background: #111715;
      border: 1px solid #43504b;
      border-radius: 6px;
      color: #f0eee7;
      font: 13px/1.2 ui-sans-serif, system-ui, sans-serif;
      min-height: 30px;
      min-width: 0;
      padding: 0 10px;
      width: 100%;
    }

    .action-button {
      appearance: none;
      background: #111715;
      border: 1px solid #43504b;
      border-radius: 6px;
      color: #f0eee7;
      cursor: pointer;
      font: 700 12px/1 ui-sans-serif, system-ui, sans-serif;
      min-height: 30px;
      min-width: 0;
      padding: 0 10px;
      width: 100%;
    }

    .action-button:disabled {
      color: #7c8882;
      cursor: wait;
    }

    option {
      background: #101312;
      color: #f0eee7;
    }

    .value {
      color: #f0eee7;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-width: 0;
      overflow: hidden;
      overflow-wrap: anywhere;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hud {
      align-items: flex-end;
      bottom: 12px;
      display: flex;
      gap: 8px;
      left: 12px;
      max-width: calc(100vw - 24px);
      pointer-events: none;
    }

    .status,
    .fps {
      background: rgba(13, 17, 16, 0.72);
      border: 1px solid rgba(194, 211, 203, 0.16);
      box-sizing: border-box;
      min-height: 28px;
      padding: 6px 9px;
    }

    .status {
      align-items: center;
      display: flex;
      gap: 10px;
      min-width: 0;
    }

    .fps {
      color: #f0eee7;
      flex: 0 0 auto;
      font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    @media (max-width: 640px) {
      .panel {
        right: 12px;
        width: auto;
      }

      .hud {
        align-items: stretch;
        flex-direction: column;
      }

      .value {
        white-space: normal;
      }
    }
  </style>
  <script src="./webgpu-direct.js" type="module"></script>
</head>
<body>
  <div id="container">
    <aside class="panel" aria-label="Direct WebGPU metrics">
      <div class="control-row">
        <label class="label" for="material-sample">Material</label>
        <select id="material-sample" name="material-sample"></select>
      </div>
      <div class="control-row">
        <span class="label">Benchmark</span>
        <button class="action-button" type="button" data-benchmark-switches>Run switches</button>
      </div>
      <div class="metric-row">
        <span class="label">Renderer</span>
        <span class="value" data-metric="renderer">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Adapter</span>
        <span class="value" data-metric="adapter">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Device Init</span>
        <span class="value" data-metric="deviceInit">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Pipeline</span>
        <span class="value" data-metric="pipeline">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Contract</span>
        <span class="value" data-metric="contract">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Material</span>
        <span class="value" data-metric="material">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Model</span>
        <span class="value" data-metric="model">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Model Load</span>
        <span class="value" data-metric="modelLoad">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Upload</span>
        <span class="value" data-metric="materialUpload">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Switch Frame</span>
        <span class="value" data-metric="materialSwitchFrame">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Switch GPU</span>
        <span class="value" data-metric="materialSwitchGpu">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Switch Avg</span>
        <span class="value" data-metric="materialSwitchAverage">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Switch p95</span>
        <span class="value" data-metric="materialSwitchP95">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Mesh</span>
        <span class="value" data-metric="mesh">-</span>
      </div>
      <div class="metric-row">
        <span class="label">First Frame</span>
        <span class="value" data-metric="firstFrame">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Frame Avg</span>
        <span class="value" data-metric="frameAverage">-</span>
      </div>
      <div class="metric-row">
        <span class="label">Frame p95</span>
        <span class="value" data-metric="frameP95">-</span>
      </div>
    </aside>
    <div class="hud">
      <div class="status">
        <span class="label">Status</span>
        <span class="value" data-status>Starting direct WebGPU lab</span>
      </div>
      <div class="fps" data-fps>-- fps</div>
    </div>
    <canvas id="direct-webgpu-canvas" tabindex="1"></canvas>
  </div>
</body>
</html>
