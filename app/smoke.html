<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mxv</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo=" />
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #111414;
      color: #e8e5dc;
      margin: 0;
    }

    .workspace {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
      gap: 1px;
      background: #323936;
    }

    .summary,
    .shader {
      background: #171b19;
      min-width: 0;
    }

    .summary {
      padding: 28px;
    }

    .shader {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .eyebrow {
      color: #8fd0b1;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      margin: 0 0 8px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 30px;
      line-height: 1.1;
      margin: 0 0 28px;
    }

    .stats {
      display: grid;
      gap: 16px;
      margin: 0;
    }

    .stats div {
      display: grid;
      gap: 4px;
    }

    dt {
      color: #95a19b;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    dd {
      font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .toolbar {
      align-items: center;
      background: #1d2320;
      border-bottom: 1px solid #323936;
      display: flex;
      gap: 8px;
      min-height: 48px;
      padding: 8px 12px;
      box-sizing: border-box;
    }

    .tab {
      appearance: none;
      background: transparent;
      border: 1px solid #3c4541;
      border-radius: 6px;
      color: #d8d5cc;
      cursor: pointer;
      font: 700 13px/1 ui-sans-serif, system-ui, sans-serif;
      min-width: 84px;
      min-height: 32px;
      padding: 0 14px;
    }

    .tab.is-active {
      background: #c7f0dc;
      border-color: #c7f0dc;
      color: #102019;
    }

    pre {
      background: #101312;
      color: #d9d3c7;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin: 0;
      overflow: auto;
      padding: 18px;
      white-space: pre;
    }

    @media (max-width: 760px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(60vh, 1fr);
      }

      .summary {
        padding: 22px;
      }
    }
  </style>
  <script src="./smoke.js" type="module"></script>
</head>
<body></body>
</html>
