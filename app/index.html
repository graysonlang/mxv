<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mxv</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo=" />
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #101312;
      color: #efede7;
      margin: 0;
      overflow: hidden;
    }

    #container {
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr);
      min-height: 100vh;
    }

    .mode-bar {
      align-items: center;
      background: #0f1513;
      border-bottom: 1px solid rgba(183, 205, 193, 0.18);
      box-sizing: border-box;
      display: flex;
      gap: 8px;
      min-width: 0;
      overflow-x: auto;
      padding: 6px 8px;
    }

    .brand {
      color: #f0eee7;
      flex: 0 0 auto;
      font: 700 13px/1 ui-sans-serif, system-ui, sans-serif;
      margin-right: 4px;
      text-decoration: none;
    }

    .mode-link {
      align-items: center;
      background: #111715;
      border: 1px solid #43504b;
      border-radius: 6px;
      box-sizing: border-box;
      color: #e5e0d5;
      display: inline-flex;
      flex: 0 0 auto;
      font: 700 12px/1 ui-sans-serif, system-ui, sans-serif;
      justify-content: center;
      min-height: 30px;
      min-width: 82px;
      padding: 0 10px;
      text-decoration: none;
    }

    .mode-link.is-active {
      background: #79d0d0;
      border-color: #79d0d0;
      color: #071716;
    }

    .open-link {
      color: #c3d0ca;
      flex: 0 0 auto;
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin-left: auto;
      text-decoration: none;
    }

    .open-link:hover {
      color: #ffffff;
    }

    iframe {
      background: #101312;
      border: 0;
      display: block;
      height: 100%;
      width: 100%;
    }

    @media (max-width: 640px) {
      #container {
        grid-template-rows: 40px minmax(0, 1fr);
      }

      .brand,
      .open-link {
        display: none;
      }
    }
  </style>
  <script src="./index.js" type="module"></script>
</head>
<body>
  <div id="container">
    <nav class="mode-bar" aria-label="Renderer mode">
      <a class="brand" href="#webgl" aria-label="mxv">mxv</a>
      <a class="mode-link" href="#webgl" data-mode-link="webgl">WebGL</a>
      <a class="mode-link" href="#webgpu" data-mode-link="webgpu">WebGPU</a>
      <a class="mode-link" href="#direct" data-mode-link="direct">Direct</a>
      <a class="open-link" href="./webgl.html" target="_blank" rel="noreferrer" data-open-current>Open mode</a>
    </nav>
    <iframe title="mxv renderer mode" data-mode-frame src="./webgl.html"></iframe>
  </div>
</body>
</html>
